# =============================================================================
# Grafana Datasources Configuration
# =============================================================================
# Cấu hình tự động kết nối Grafana với PostgreSQL
# File này sẽ được mount vào container Grafana
# =============================================================================

apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: postgres_ds
    type: postgres
    access: proxy
    url: postgres:5432
    database: crypto_db
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
      maxOpenConns: 20
      maxIdleConns: 5
      connMaxLifetime: 14400
      connMaxIdleTime: 14400
    isDefault: true
    editable: true
