# =============================================================================
# Grafana Datasources Configuration
# =============================================================================
# Cấu hình tự động kết nối Grafana với ClickHouse
# File này sẽ được mount vào container Grafana
# =============================================================================

apiVersion: 1

datasources:
  - name: ClickHouse
    uid: clickhouse_ds
    type: grafana-clickhouse-datasource
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      defaultDatabase: crypto_db
      username: default
    secureJsonData:
      password: crypto123
    isDefault: true
    editable: true
