# =============================================================================
# Grafana Dashboards Provisioning
# =============================================================================
# Cấu hình tự động load dashboard từ JSON files
# =============================================================================

apiVersion: 1

providers:
  - name: crypto-dashboards
    orgId: 1
    folder: Crypto
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
