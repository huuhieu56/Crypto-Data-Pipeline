<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Chat Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-tertiary: #242736;
    --bg-user-bubble: #3b82f6;
    --bg-assistant-bubble: #1e2233;
    --text-primary: #e4e6ed;
    --text-secondary: #8b8fa3;
    --text-accent: #60a5fa;
    --border-color: #2a2d3a;
    --shadow-glow: rgba(59, 130, 246, 0.15);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius: 12px;
    --transition: 0.2s ease;
  }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
  }

  /* --- Header --- */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .header-info {
    flex: 1;
    min-width: 0;
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .header-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .new-chat-btn {
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 11px;
    font-family: var(--font);
    cursor: pointer;
    transition: all var(--transition);
  }

  .new-chat-btn:hover {
    background: rgba(220, 38, 38, 0.15);
    border-color: rgba(220, 38, 38, 0.4);
    color: #f87171;
  }

  .symbol-badge {
    padding: 3px 10px;
    border-radius: 6px;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
    border: 1px solid rgba(59, 130, 246, 0.3);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-accent);
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  /* --- Messages area --- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 88%;
    animation: fadeSlideIn 0.25s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-avatar {
    background: var(--bg-user-bubble);
  }

  .msg.assistant .msg-avatar {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.55;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .msg.user .msg-bubble {
    background: var(--bg-user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant .msg-bubble {
    background: var(--bg-assistant-bubble);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-bottom-left-radius: 4px;
  }

  /* --- Typing indicator --- */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    align-items: center;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-secondary);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* --- Welcome message --- */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 24px;
    gap: 12px;
    opacity: 0.85;
  }

  .welcome-icon {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15));
    border: 1px solid rgba(59, 130, 246, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .welcome h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .welcome p {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 340px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 4px;
  }

  .suggestion-btn {
    padding: 6px 12px;
    border-radius: 8px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 11px;
    font-family: var(--font);
    cursor: pointer;
    transition: all var(--transition);
  }

  .suggestion-btn:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.3);
    color: var(--text-accent);
  }

  /* --- Input bar --- */
  .input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border-color);
    flex-shrink: 0;
  }

  .input-bar textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    font-family: var(--font);
    font-size: 13px;
    padding: 9px 14px;
    outline: none;
    min-height: 38px;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color var(--transition);
  }

  .input-bar textarea::placeholder {
    color: var(--text-secondary);
  }

  .input-bar textarea:focus {
    border-color: var(--bg-user-bubble);
    box-shadow: 0 0 0 2px var(--shadow-glow);
  }

  .send-btn {
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 10px;
    background: var(--bg-user-bubble);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    flex-shrink: 0;
  }

  .send-btn:hover:not(:disabled) {
    background: #2563eb;
    transform: scale(1.04);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* --- Error toast --- */
  .error-toast {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #dc2626;
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 100;
    animation: fadeSlideIn 0.3s ease;
    box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-info">
      <div class="header-title">AI Market Analyst</div>
      <div class="header-sub">Powered by LangGraph · Dynamic timeframe analysis</div>
    </div>
    <div class="header-actions">
      <button class="new-chat-btn" id="newChatBtn">🗑 New Chat</button>
    </div>
    <div class="symbol-badge" id="symbolBadge">__SYMBOL__</div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">📊</div>
      <h2 id="welcomeTitle">Analyzing __SYMBOL__</h2>
      <p>Ask anything about this coin — trend, RSI, MACD, support/resistance, or trading considerations. Market data is dynamically loaded based on your analysis timeframe.</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-btn">Phân tích xu hướng 3 ngày tới</button>
        <button class="suggestion-btn">Xu hướng dài hạn 1 năm</button>
        <button class="suggestion-btn">RSI đang cho tín hiệu gì?</button>
        <button class="suggestion-btn">Nên chờ mua hay bán?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <textarea id="input" placeholder="Ask about __SYMBOL__..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      ▶
    </button>
  </div>
</div>

<script>
(function() {
  const SYMBOL = '__SYMBOL__';
  const API_BASE = window.location.origin;
  const IS_EMBEDDED = window.self !== window.top;
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const suggestionButtons = document.querySelectorAll('.suggestion-btn');
  const newChatBtn = document.getElementById('newChatBtn');
  let welcomeEl = document.getElementById('welcome');
  let isLoading = false;

  // --- Session ID management ---
  function getSessionId() {
    let sid = localStorage.getItem('chat_session_id');
    if (!sid) {
      sid = crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
      localStorage.setItem('chat_session_id', sid);
    }
    return sid;
  }

  let SESSION_ID = getSessionId();

  // --- Load chat history on page load ---
  async function loadHistory() {
    try {
      const resp = await fetch(`${API_BASE}/api/chat/history/${SESSION_ID}`);
      if (!resp.ok) return;
      const data = await resp.json();
      if (data.messages && data.messages.length > 0) {
        if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }
        data.messages.forEach(function(msg) {
          addMessage(msg.role, msg.content);
        });
      }
    } catch (err) {
      console.warn('Failed to load chat history:', err);
    }
  }

  loadHistory();

  // --- Event bindings ---
  function maybeFocusInput() {
    if (!IS_EMBEDDED) {
      inputEl.focus();
    }
  }

  inputEl.addEventListener('input', function() {
    autoResize(inputEl);
    sendBtn.disabled = !inputEl.value.trim() || isLoading;
  });
  inputEl.addEventListener('keydown', handleKey);
  sendBtn.addEventListener('click', sendMessage);
  suggestionButtons.forEach(function(btn) {
    btn.addEventListener('click', function() { useSuggestion(btn); });
  });
  newChatBtn.addEventListener('click', startNewChat);

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function useSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendBtn.disabled = false;
    maybeFocusInput();
    sendMessage();
  }

  async function startNewChat() {
    try {
      await fetch(`${API_BASE}/api/chat/history/${SESSION_ID}`, { method: 'DELETE' });
    } catch (err) {
      console.warn('Failed to delete history:', err);
    }
    // Generate new session
    const newSid = crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    localStorage.setItem('chat_session_id', newSid);
    SESSION_ID = newSid;
    // Clear UI
    messagesEl.innerHTML = '';
    location.reload();
  }

  function addMessage(role, content) {
    if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }

    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';
    wrapper.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(typing);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function showError(msg) {
    const toast = document.createElement('div');
    toast.className = 'error-toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 4000);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    showTyping();

    try {
      const resp = await fetch(API_BASE + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: SESSION_ID,
          symbol: SYMBOL,
          message: text,
        }),
      });

      removeTyping();

      if (!resp.ok) {
        const err = await resp.json().catch(function() { return {}; });
        throw new Error(err.detail || 'HTTP ' + resp.status);
      }

      const data = await resp.json();
      addMessage('assistant', data.reply);

    } catch (err) {
      removeTyping();
      showError(err.message || 'Failed to get response');
      console.error('Chat error:', err);
    } finally {
      isLoading = false;
      sendBtn.disabled = !inputEl.value.trim();
      maybeFocusInput();
    }
  }

  maybeFocusInput();
})();
</script>
</body>
</html>
