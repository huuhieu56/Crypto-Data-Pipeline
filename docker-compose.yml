# =============================================================================
# Docker Compose - Crypto Data Pipeline Services
# =============================================================================
# Services:
#   - ClickHouse: Data Warehouse (port 8123 HTTP, 9100 native)
#   - MinIO: Object Storage S3-compatible (port 9000 API, 9001 Console)
#   - Airflow Webserver: DAG UI (port 8080)
#   - Airflow Scheduler: Chạy DAGs
#   - Grafana: Dashboard visualization (port 3000)
# =============================================================================
# Khởi chạy: docker-compose up -d
# Dừng: docker-compose down
# =============================================================================

services:
  # --- ClickHouse ---
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: crypto_clickhouse_container
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9100}:9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-crypto123}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-crypto_db}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - crypto_network
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--query", "SELECT 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MinIO Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: crypto_minio_container
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - crypto_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO init: tao buckets khi khoi dong
  minio-init:
    image: minio/mc:latest
    container_name: crypto_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123}; mc mb --ignore-existing local/$${MINIO_BUCKET_RAW:-crypto-raw}; mc mb --ignore-existing local/$${MINIO_BUCKET_PROCESSED:-crypto-processed}; echo 'Buckets created successfully'; "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET_RAW=${MINIO_BUCKET_RAW:-crypto-raw}
      - MINIO_BUCKET_PROCESSED=${MINIO_BUCKET_PROCESSED:-crypto-processed}
    networks:
      - crypto_network

  # --- Airflow Metadata DB ---
  airflow-postgres:
    image: postgres:15
    container_name: crypto_airflow_postgres_container
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER:-airflow}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD:-airflow}
      - POSTGRES_DB=${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - crypto_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Airflow Init (DB migrate + admin user) ---
  airflow-init:
    image: apache/airflow:2.8.0-python3.11
    container_name: crypto_airflow_init_container
    depends_on:
      airflow-postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USER:-admin} --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Ho_Chi_Minh
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/project/airflow/dags
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      - _PIP_ADDITIONAL_REQUIREMENTS=clickhouse-connect minio
      - CLICKHOUSE_HOST=clickhouse
      - MINIO_ENDPOINT=minio:9000
      - MINIO_SECURE=false
      - TZ=Asia/Ho_Chi_Minh
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
      - airflow_logs:/opt/airflow/logs
    networks:
      - crypto_network

  # --- Airflow Webserver ---
  airflow-webserver:
    image: apache/airflow:2.8.0-python3.11
    container_name: crypto_airflow_webserver_container
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Ho_Chi_Minh
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/project/airflow/dags
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE=Asia/Ho_Chi_Minh
      - _PIP_ADDITIONAL_REQUIREMENTS=clickhouse-connect minio
      - CLICKHOUSE_HOST=clickhouse
      - MINIO_ENDPOINT=minio:9000
      - MINIO_SECURE=false
      - ETL_MONTHS_BACK=${ETL_MONTHS_BACK:-36}
      - TZ=Asia/Ho_Chi_Minh
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
      - airflow_logs:/opt/airflow/logs
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - crypto_network

  # --- Airflow Scheduler ---
  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.11
    container_name: crypto_airflow_scheduler_container
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Ho_Chi_Minh
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/project/airflow/dags
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/${AIRFLOW_DB_NAME:-airflow}
      - _PIP_ADDITIONAL_REQUIREMENTS=clickhouse-connect minio
      - CLICKHOUSE_HOST=clickhouse
      - MINIO_ENDPOINT=minio:9000
      - MINIO_SECURE=false
      - ETL_MONTHS_BACK=${ETL_MONTHS_BACK:-36}
      - TZ=Asia/Ho_Chi_Minh
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./:/opt/project
      - airflow_logs:/opt/airflow/logs
    networks:
      - crypto_network

  # --- Chat API (LLM chatbox backend) ---
  chat-api:
    build:
      context: ./services/chat_api
    container_name: crypto_chat_api_container
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${CHAT_API_PORT:-8501}:8501"
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_NATIVE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-crypto123}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-crypto_db}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.5-flash-lite}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-crypto-chatbot}
      - LANGCHAIN_CALLBACKS_BACKGROUND=true
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./:/opt/project
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Grafana ---
  grafana:
    image: grafana/grafana:11.4.0
    container_name: crypto_grafana_container
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource,volkovlabs-echarts-panel 6.5.0
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Asia/Ho_Chi_Minh
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - crypto_network

volumes:
  clickhouse_data:
  grafana_data:
  minio_data:
  airflow_postgres_data:
  airflow_logs:


networks:
  crypto_network:
    driver: bridge
