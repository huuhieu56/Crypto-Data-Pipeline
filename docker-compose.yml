# =============================================================================
# Docker Compose - Crypto Data Pipeline Services
# =============================================================================
# Services:
#   - ClickHouse: Data Warehouse (port 8123 HTTP, 9100 native)
#   - MinIO: Object Storage S3-compatible (port 9000 API, 9001 Console)
#   - Airflow Webserver: DAG UI (port 8080)
#   - Airflow Scheduler: Chạy DAGs
#   - Grafana: Dashboard visualization (port 3000)
# =============================================================================
# Khởi chạy: docker-compose up -d
# Dừng: docker-compose down
# =============================================================================

services:
  # --- ClickHouse ---
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: crypto_clickhouse_container
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9100}:9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-crypto123}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-crypto_db}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MinIO Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: crypto_minio_container
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - crypto_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO init: tao buckets khi khoi dong
  minio-init:
    image: minio/mc:latest
    container_name: crypto_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/$${MINIO_BUCKET_RAW:-crypto-raw};
      mc mb --ignore-existing local/$${MINIO_BUCKET_PROCESSED:-crypto-processed};
      echo 'Buckets created successfully';
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_BUCKET_RAW=${MINIO_BUCKET_RAW:-crypto-raw}
      - MINIO_BUCKET_PROCESSED=${MINIO_BUCKET_PROCESSED:-crypto-processed}
    networks:
      - crypto_network

  # --- Airflow Webserver ---
  airflow-webserver:
    image: apache/airflow:2.8.0
    # ... config

  # --- Airflow Scheduler ---
  airflow-scheduler:
    image: apache/airflow:2.8.0
    # ... config

  # --- Grafana ---
  grafana:
    image: grafana/grafana:11.4.0
    container_name: crypto_grafana_container
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Asia/Ho_Chi_Minh
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - crypto_network

volumes:
  clickhouse_data:
  grafana_data:
  minio_data:

networks:
  crypto_network:
    driver: bridge
