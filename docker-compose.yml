# =============================================================================
# Docker Compose - Crypto Data Pipeline Services
# =============================================================================
# Services:
#   - PostgreSQL: Data Warehouse (port 5432)
#   - Airflow Webserver: DAG UI (port 8080)
#   - Airflow Scheduler: Chạy DAGs
#   - Grafana: Dashboard visualization (port 3000)
# =============================================================================
# Khởi chạy: docker-compose up -d
# Dừng: docker-compose down
# =============================================================================

version: '3.8'

services:
  # TODO: Cấu hình PostgreSQL
  postgres:
    image: postgres:15
    container_name: crypto_postgres_container
    ports:
      - "5432:5432"  # Mở cổng 5432 ra máy thật để Python kết nối
    environment:
      - POSTGRES_USER= crypto123az
      - POSTGRES_PASSWORD=crypto123
      - POSTGRES_DB=crypto_db      # Tên Database mặc định
    volumes:
      - postgres_data:/var/lib/postgresql/data # Lưu dữ liệu để không bị mất khi tắt Docker
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d crypto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # TODO: Cấu hình Airflow Webserver
  airflow-webserver:
    image: apache/airflow:2.8.0
    # ... config

  # TODO: Cấu hình Airflow Scheduler
  airflow-scheduler:
    image: apache/airflow:2.8.0
    # ... config

  # TODO: Cấu hình Grafana
  grafana:
    image: grafana/grafana:latest
    # ... config

volumes:
  postgres_data:
  grafana_data:

networks:
  crypto_network:
    driver: bridge
