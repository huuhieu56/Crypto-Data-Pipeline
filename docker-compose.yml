# =============================================================================
# Docker Compose - Crypto Data Pipeline Services
# =============================================================================
# Services:
#   - PostgreSQL: Data Warehouse (port 5432)
#   - Airflow Webserver: DAG UI (port 8080)
#   - Airflow Scheduler: Chạy DAGs
#   - Grafana: Dashboard visualization (port 3000)
# =============================================================================
# Khởi chạy: docker-compose up -d
# Dừng: docker-compose down
# =============================================================================

version: '3.8'

services:
  # TODO: Cấu hình PostgreSQL
  postgres:
    image: postgres:15
    container_name: crypto_postgres_container
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # TODO: Cấu hình Airflow Webserver
  airflow-webserver:
    image: apache/airflow:2.8.0
    # ... config

  # TODO: Cấu hình Airflow Scheduler
  airflow-scheduler:
    image: apache/airflow:2.8.0
    # ... config

  # TODO: Cấu hình Grafana
  grafana:
    image: grafana/grafana:latest
    # ... config

volumes:
  postgres_data:
  grafana_data:

networks:
  crypto_network:
    driver: bridge
